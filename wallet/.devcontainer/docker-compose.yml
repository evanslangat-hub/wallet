version: '3.9'
services:
  wallet:
    build:
      context: ..
      dockerfile: Dockerfile
    image: wallet:dev
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;https://+:8081"
    volumes:
      - ..:/workspace:cached
    command: dotnet watch run --urls=http://+:8080;https://+:8081
